version: 2
# Touch to re-trigger Dependabot on 2026-06-02.

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "mix"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    reviewers:
      - "dewetblomerus"

  - package-ecosystem: "docker"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    reviewers:
      - "dewetblomerus"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    reviewers:
      - "dewetblomerus"
